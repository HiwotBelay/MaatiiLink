services:
  db:
    image: postgres:16-alpine
    container_name: maatiilink-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: maatiilink
      POSTGRES_PASSWORD: maatiilink_dev
      POSTGRES_DB: maatiilink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maatiilink -d maatiilink"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
